<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kasse</title>

<link rel="stylesheet" href="style.css?v=20260319">
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="topbar">
  <div class="logo"></div>

  <h2 style="display:none;"></h2>

  <div class="topbar-right">
    <a href="history.html" class="nav-btn">
      <img src="images/historyblue.png">
      <span>Verlauf</span>
    </a>

    <a href="stats.html" class="nav-btn">
      <img src="images/registerblue.png">
      <span>Abrechnung</span>
    </a>

    <button id="fullscreen-btn">⛶</button>
  </div>
</header>

<div class="layout">

  

<!-- Sidebar -->
<div class="sidebar">

  <div class="category active"
       onclick="showCategory(event, 'all')">
    <span>Alles</span>
  </div>

  <div class="category"
       onclick="showCategory(event, 'bier')"
       data-icon="images/beerblue.png"
       data-icon-active="images/beerwhite.png">
    <img src="images/beerblue.png">
    <span>Bier</span>
  </div>

  <div class="category"
       onclick="showCategory(event, 'longdrink')"
       data-icon="images/longdrinksblue.png"
       data-icon-active="images/longdrinkswhite.png">
    <img src="images/longdrinksblue.png">
    <span>Longdrinks</span>
  </div>

  <div class="category"
       onclick="showCategory(event, 'shot')"
       data-icon="images/shotsblue.png"
       data-icon-active="images/shotswhite.png">
    <img src="images/shotsblue.png">
    <span>Shots</span>
  </div>

  <div class="category"
       onclick="showCategory(event, 'soft')"
       data-icon="images/alcfreeblue.png"
       data-icon-active="images/alcfreewhite.png">
    <img src="images/alcfreeblue.png">
    <span>Alkoholfrei</span>
  </div>

</div>

<!-- Getränke -->
<main>
  <div id="drink-grid" class="drink-grid"></div>
</main>

<div class="mobile-order-bar">
  <button id="order-toggle" class="order-toggle" type="button">
    Bestellung
  </button>
  <div class="mobile-order-total">
    <span>Gesamt</span>
    <strong id="mobile-total">0.00€</strong>
  </div>
  <button class="finish-btn mobile-finish-btn" onclick="finishOrder()">IN</button>
</div>

<div id="order-backdrop" class="order-backdrop"></div>

<!-- Bestellung -->
<section class="order-panel" id="order-panel">

  <div class="order-table">

    <div class="order-header">
      <span>Getränk</span>
      <span>Stück</span>
      <span>Preis</span>
      <span></span>
    </div>

    <div id="current-order"></div>

    <div class="deposit-area">
      <button class="deposit-add" onclick="addDeposit()">+ Pfand</button>
      <button class="deposit-remove" onclick="addDepositReturn()">- Pfand</button>
    </div>

    <div class="order-total">
      <span>Gesamt:</span>
      <span id="current-total" style="cursor: pointer;">0.00€</span>
    </div>

    <button class="finish-btn" onclick="finishOrder()">IN</button>

  </div>

</section>

<div id="price-modal" class="modal">
  <div class="modal-card">
    <div style="font-size: 16px; color: #999; margin-bottom: 12px;">Gesamtpreis</div>
    <div id="modal-price" style="font-size: 56px; font-weight: 700; color: #4357AD; margin-bottom: 20px;">0.00€</div>
    <div style="font-size: 12px; color: #999;">Zum Schließen überall klicken</div>
  </div>
</div>

</div>

<script>
  console.log("✅ HTML Inline Script lädt!");
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js?v=20260319"></script>

</body>
</html>
